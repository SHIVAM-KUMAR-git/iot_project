<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - SISTec IoT Application 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="flex items-center justify-center min-h-screen">

    <div class="glass-card p-8 w-full max-w-md animate-fade-in shadow-2xl">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-green-400 mb-2">Join SISTec IoT</h1>
            <p class="text-gray-400 text-sm">Create a new account</p>
        </div>

        <form id="registerForm" class="space-y-5">
            <div>
                <label class="block text-sm font-medium text-gray-300 mb-1">Full Name</label>
                <input type="text" id="name" required class="input-field" placeholder="John Doe">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-300 mb-1">Email Address</label>
                <input type="email" id="email" required class="input-field" placeholder="student@sistec.ac.in">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-300 mb-1">Password</label>
                <input type="password" id="password" required class="input-field" placeholder="••••••••">
            </div>

            <button type="submit" class="btn-success w-full py-3 mt-6 text-lg">Register</button>
        </form>

        <p class="mt-6 text-center text-gray-400 text-sm">
            Already have an account? <a href="index.html" class="text-green-400 hover:text-green-300 font-semibold transition">Login here</a>
        </p>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const res = await fetch('/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password })
                });
                const data = await res.json();

                if (res.ok) {
                    alert('Registration successful! Please login.');
                    window.location.href = 'index.html';
                } else {
                    alert(data.error || 'Registration failed');
                }
            } catch (err) {
                alert('Network error. Is server running?');
            }
        });
    </script>
</body>
</html>
